<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>microbit app</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: #fffaf3;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
        --accent-2: #ef4444;
        --border: #e5dccd;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top, #fff8e7 0, var(--bg) 40%, #ebe5d9 100%);
        color: var(--text);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .lead {
        margin: 0 0 24px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.875rem;
        color: var(--muted);
      }

      input,
      button,
      pre {
        font: inherit;
      }

      input {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: white;
        color: var(--text);
      }

      button {
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        cursor: pointer;
        font-weight: 700;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .secondary {
        background: var(--accent-2);
        color: white;
      }

      pre {
        margin: 0;
        padding: 16px;
        min-height: 180px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: #e2e8f0;
        overflow: auto;
        white-space: pre-wrap;
      }

      .status {
        color: var(--muted);
        font-size: 0.875rem;
      }

      @media (max-width: 640px) {
        .controls,
        .buttons {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>microbit app</h1>
        <p class="lead">Two buttons, one display, and a live microbit stream.</p>

        <div class="grid">
          <div class="controls">
            <label>
              Backend URL
              <input id="backendUrl" />
            </label>
            <label>
              Device ID
              <input id="deviceId" placeholder="velozz..." />
            </label>
          </div>

          <div class="buttons">
            <button class="primary" id="buttonA" type="button">Button A</button>
            <button class="secondary" id="buttonB" type="button">Button B</button>
          </div>

          <div class="status" id="status">Waiting for a deviceId.</div>
          <div class="status" id="streamStatus">Stream disconnected.</div>
          <pre id="display">No data yet.</pre>
        </div>
      </div>
    </main>

    <script>
      const backendUrlInput = document.getElementById("backendUrl");
      const deviceIdInput = document.getElementById("deviceId");
      const statusEl = document.getElementById("status");
      const streamStatusEl = document.getElementById("streamStatus");
      const displayEl = document.getElementById("display");
      const buttonA = document.getElementById("buttonA");
      const buttonB = document.getElementById("buttonB");
      const maxRecentRecords = 5;

      const backendUrlDefault = "https://microbit-backend.velozz.workers.dev";
      const seededDeviceId = "velozzqtminsuut";
      const defaults = {
        backendUrl: localStorage.getItem("backendUrl") ?? backendUrlDefault,
        deviceId: localStorage.getItem("deviceId") ?? seededDeviceId,
      };

      backendUrlInput.value = defaults.backendUrl;
      deviceIdInput.value = defaults.deviceId;

      let eventSource = null;
      let view = {
        state: null,
        latestEvent: null,
        recentEvents: [],
      };

      const saveInputs = () => {
        localStorage.setItem("backendUrl", backendUrlInput.value.trim());
        localStorage.setItem("deviceId", deviceIdInput.value.trim());
      };

      const render = (message) => {
        statusEl.textContent = message;
        displayEl.textContent = JSON.stringify(view, null, 2);
      };

      const setStreamStatus = (message) => {
        streamStatusEl.textContent = message;
      };

      const deviceUrl = () => {
        const backendUrl = backendUrlInput.value.trim().replace(/\/$/, "");
        const deviceId = deviceIdInput.value.trim();
        if (!backendUrl || !deviceId) {
          return null;
        }
        return { backendUrl, deviceId };
      };

      const closeStream = () => {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
      };

      const openStream = () => {
        const target = deviceUrl();
        closeStream();
        if (!target) {
          render("Waiting for a backend URL and deviceId.");
          setStreamStatus("Stream disconnected.");
          return;
        }

        const url = `${target.backendUrl}/v1/app/devices/${encodeURIComponent(target.deviceId)}/stream?deviceId=${encodeURIComponent(target.deviceId)}`;
        setStreamStatus(`Connecting to stream for ${target.deviceId}...`);
        eventSource = new EventSource(url);

        eventSource.addEventListener("open", () => {
          setStreamStatus(`Live stream connected for ${target.deviceId}.`);
          render("Live stream connected.");
        });

        eventSource.addEventListener("snapshot", (event) => {
          view = JSON.parse(event.data);
          setStreamStatus(`Live stream connected for ${target.deviceId}.`);
          render("Live stream connected.");
        });

        eventSource.addEventListener("update", (event) => {
          const payload = JSON.parse(event.data);
          if (payload.state) {
            view.state = payload.state;
          }
          if (payload.item) {
            view.latestEvent = payload.item;
            view.recentEvents = [payload.item, ...view.recentEvents].slice(0, maxRecentRecords);
          }
          setStreamStatus(`Live update received for ${target.deviceId}.`);
          render("Live update received.");
        });

        eventSource.addEventListener("error", () => {
          setStreamStatus(`Stream reconnecting for ${target.deviceId}...`);
          statusEl.textContent = "Stream reconnecting.";
        });
      };

      const refresh = async () => {
        const target = deviceUrl();
        if (!target) {
          render("Waiting for a backend URL and deviceId.");
          setStreamStatus("Stream disconnected.");
          return;
        }

        saveInputs();
        try {
          const res = await fetch(`${target.backendUrl}/v1/app/devices/${encodeURIComponent(target.deviceId)}`);
          const json = await res.json();
          if (!res.ok || !json.ok) {
            throw new Error(json.error ?? `HTTP ${res.status}`);
          }
          view = {
            state: json.item.state ?? null,
            latestEvent: json.item.latestEvent ?? null,
            recentEvents: json.item.recentEvents ?? [],
          };
          setStreamStatus(`Snapshot loaded for ${target.deviceId}.`);
          render("Waiting for live updates.");
          openStream();
        } catch (error) {
          setStreamStatus("Stream disconnected.");
          render(`Load failed: ${error.message}`);
        }
      };

      const sendCommand = async (value) => {
        const target = deviceUrl();
        if (!target) {
          render("Waiting for a backend URL and deviceId.");
          setStreamStatus("Stream disconnected.");
          return;
        }

        saveInputs();
        buttonA.disabled = true;
        buttonB.disabled = true;
        try {
          const res = await fetch(
            `${target.backendUrl}/v1/app/devices/${encodeURIComponent(target.deviceId)}/command`,
            {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify({ name: "show", value }),
            },
          );
          const json = await res.json();
          if (!res.ok || !json.ok) {
            throw new Error(json.error ?? `HTTP ${res.status}`);
          }
          render(`Command sent: show ${value}`);
          setStreamStatus(`Command sent to ${target.deviceId}.`);
        } catch (error) {
          render(`Command failed: ${error.message}`);
        } finally {
          buttonA.disabled = false;
          buttonB.disabled = false;
        }
      };

      buttonA.addEventListener("click", () => sendCommand("A"));
      buttonB.addEventListener("click", () => sendCommand("B"));
      deviceIdInput.addEventListener("change", refresh);
      backendUrlInput.addEventListener("change", refresh);

      refresh();
    </script>
  </body>
</html>
